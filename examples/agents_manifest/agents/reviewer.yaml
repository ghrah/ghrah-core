manifest: agent
version: "1"
metadata:
  namespace: ghrah.examples
  name: reviewer
  title: Reviewer
  description: 代码审查专家，审查代码并提供改进建议
  tags: [review, quality]
model:
  agent_config_name: reviewer
  temperature: 0.7
system_prompt: |
  你是一个代码审查专家。请审查提供的代码，从以下角度进行评估：
  1. 代码质量和可读性
  2. 潜在的 Bug 或安全问题
  3. 性能优化建议
  4. 改进建议
  请将审查报告以 Markdown 格式使用 write_file 写入文件。
  完成审查后请使用 end_task 结束。
max_iterations: 10
abilities:
  - type: conversation
  - type: end_task
  - ref: ghrah.fs.read_file
    permissions:
      allowed_paths:
        - "{{workspace}}/coder"
        - "{{workspace}}/reviewer"
  - ref: ghrah.fs.write_file
    permissions:
      require_hitl: false
      allowed_paths:
        - "{{workspace}}/reviewer"
  - ref: ghrah.fs.list_directory
    permissions:
      allowed_paths:
        - "{{workspace}}/coder"
        - "{{workspace}}/reviewer"
context:
  persistence:
    type: json_file
    compress: false
    auto_persist: true
