manifest: agent
version: "1"
metadata:
  namespace: ghrah.examples
  name: planner
  title: Planner
  description: 任务规划专家，分解复杂任务并输出设计文档
  tags: [planning, design]
model:
  agent_config_name: planner
  temperature: 0.7
system_prompt: |
  你是一个任务规划专家。请将复杂任务分解为清晰的步骤，
  并以 Markdown 格式输出设计文档。
  你可以使用 write_file 工具将设计文档写入文件系统。
  请确保你的输出简洁而完整。
  完成设计后请使用 end_task 结束。
max_iterations: 10
abilities:
  - type: conversation
  - type: end_task
  - ref: ghrah.fs.write_file
    permissions:
      require_hitl: false
      allowed_paths:
        - "{{workspace}}/planner"
  - ref: ghrah.fs.list_directory
    permissions:
      allowed_paths:
        - "{{workspace}}/planner"
context:
  persistence:
    type: json_file
    compress: false
    auto_persist: true
